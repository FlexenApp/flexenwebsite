<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" fill="none">
  <!--
    Project Pluto — Wordmark Monochrome
    Icon: Option C — Moon-Crescent
    Single-color variant: 100% opacity, no partial opacities.
    For print, embroidery, engraving, single-ink use.
    Color: currentColor (set to black or white at point of use)
    Minimum width: 80px
  -->

  <!-- Icon-Mark: Moon-Crescent (full opacity, monochrome) -->
  <g transform="translate(10, 40) scale(0.859)" aria-hidden="true">
    <g transform="rotate(-12, 128, 128)">
      <path
        d="M 148 182
           A 92 92 0 1 0 180 46
           A 72 72 0 0 1 148 182 Z"
        fill="currentColor"
      />
    </g>
  </g>

  <!-- Wordmark: "pluto" monochrome -->
  <text
    x="238"
    y="196"
    font-family="'Fraunces', 'Palatino Linotype', Georgia, serif"
    font-size="132"
    font-weight="500"
    letter-spacing="-0.02em"
    fill="currentColor"
    dominant-baseline="auto"
  >pluto</text>
</svg>
