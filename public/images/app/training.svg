<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <clipPath id="phoneClip-train">
      <rect width="375" height="812" rx="44" ry="44"/>
    </clipPath>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF7324"/>
      <stop offset="100%" stop-color="#FF9A5C"/>
    </linearGradient>
  </defs>

  <!-- Phone Frame -->
  <rect width="375" height="812" rx="44" ry="44" fill="#001622"/>
  <rect width="375" height="812" rx="44" ry="44" fill="none" stroke="#1a3a52" stroke-width="1"/>

  <g clip-path="url(#phoneClip-train)">
    <!-- Status Bar -->
    <text x="32" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff">9:41</text>
    <!-- Signal bars -->
    <g transform="translate(280, 18)">
      <rect x="0" y="6" width="3" height="4" rx="1" fill="#fff"/>
      <rect x="5" y="4" width="3" height="6" rx="1" fill="#fff"/>
      <rect x="10" y="2" width="3" height="8" rx="1" fill="#fff"/>
      <rect x="15" y="0" width="3" height="10" rx="1" fill="#fff"/>
    </g>
    <!-- WiFi icon -->
    <g transform="translate(310, 18)">
      <path d="M0 8 Q6 0 12 8" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M2 6 Q6 2 10 6" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="6" cy="9" r="1.5" fill="#fff"/>
    </g>
    <!-- Battery -->
    <rect x="335" y="18" width="22" height="11" rx="3" fill="none" stroke="#fff" stroke-width="1.2"/>
    <rect x="357" y="22" width="2" height="4" rx="1" fill="#fff" opacity="0.5"/>
    <rect x="337" y="20" width="16" height="7" rx="1.5" fill="#fff"/>

    <!-- ===== CONTENT STARTS y=54 ===== -->

    <!-- Top Bar: Back arrow + Title -->
    <path d="M30 76 L40 66 M30 76 L40 86" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="56" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Push Training</text>
    <!-- Ellipsis menu -->
    <circle cx="340" cy="76" r="2" fill="#6688aa"/>
    <circle cx="340" cy="84" r="2" fill="#6688aa"/>
    <circle cx="340" cy="68" r="2" fill="#6688aa"/>

    <!-- Current Exercise Card -->
    <rect x="20" y="104" width="335" height="230" rx="16" fill="#0a2a3f"/>

    <!-- Exercise name -->
    <text x="40" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Bankdrücken</text>
    <!-- Set counter -->
    <text x="40" y="164" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#757575">Satz 3 von 4</text>

    <!-- Progress dots -->
    <g transform="translate(40, 180)">
      <circle cx="0" cy="0" r="5" fill="#FF7324"/>
      <circle cx="16" cy="0" r="5" fill="#FF7324"/>
      <circle cx="32" cy="0" r="5" fill="#FF7324" opacity="0.4" stroke="#FF7324" stroke-width="1.5"/>
      <circle cx="48" cy="0" r="5" fill="none" stroke="#4a6a7a" stroke-width="1.5"/>
    </g>

    <!-- Three input boxes side by side -->
    <rect x="36" y="200" width="95" height="52" rx="10" fill="#0d3350"/>
    <text x="83" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#757575" text-anchor="middle">Sets</text>
    <text x="83" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>

    <rect x="140" y="200" width="95" height="52" rx="10" fill="#0d3350"/>
    <text x="187" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#757575" text-anchor="middle">Reps</text>
    <text x="187" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">8</text>

    <rect x="244" y="200" width="95" height="52" rx="10" fill="#0d3350"/>
    <text x="291" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#757575" text-anchor="middle">Gewicht</text>
    <text x="291" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">80 kg</text>

    <!-- "Satz abschließen" button -->
    <rect x="36" y="268" width="303" height="48" rx="12" fill="#FF7324"/>
    <text x="187" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Satz abschließen</text>

    <!-- ===== Rest Timer Section ===== -->
    <text x="187" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#757575" text-anchor="middle" letter-spacing="2">PAUSE</text>

    <!-- Timer circle background -->
    <circle cx="187" cy="456" r="64" fill="none" stroke="#0d3350" stroke-width="7"/>
    <!-- Timer circle progress (60% filled) -->
    <!-- circumference = 2 * pi * 64 = 402.12, 60% = 241.27, dashoffset = 402.12 - 241.27 = 160.85 -->
    <circle cx="187" cy="456" r="64" fill="none" stroke="#FF7324" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="402.12" stroke-dashoffset="160.85" transform="rotate(-90, 187, 456)"/>
    <!-- Timer text -->
    <text x="187" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">01:30</text>
    <text x="187" y="474" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#757575" text-anchor="middle">/ 02:30</text>

    <!-- Timer control buttons -->
    <g transform="translate(137, 536)">
      <!-- Skip button -->
      <rect x="0" y="0" width="40" height="32" rx="8" fill="#0d3350"/>
      <path d="M14 10 L22 16 L14 22Z" fill="#6688aa"/>
      <line x1="23" y1="10" x2="23" y2="22" stroke="#6688aa" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(167, 536)">
      <!-- Pause button -->
      <rect x="0" y="0" width="40" height="32" rx="8" fill="#FF7324" opacity="0.15"/>
      <rect x="14" y="9" width="4" height="14" rx="1" fill="#FF7324"/>
      <rect x="22" y="9" width="4" height="14" rx="1" fill="#FF7324"/>
    </g>
    <g transform="translate(197, 536)">
      <!-- Reset button -->
      <rect x="0" y="0" width="40" height="32" rx="8" fill="#0d3350"/>
      <path d="M14 16 A8 8 0 1 1 22 10" fill="none" stroke="#6688aa" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M20 7 L23 10 L19 11" fill="none" stroke="#6688aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- ===== Up Next Card ===== -->
    <rect x="20" y="586" width="335" height="80" rx="14" fill="#0a2a3f"/>
    <rect x="20" y="586" width="335" height="80" rx="14" fill="none" stroke="#1a3a52" stroke-width="0.5"/>

    <text x="40" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#757575" letter-spacing="1">NÄCHSTE ÜBUNG</text>
    <text x="40" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="600" fill="#ffffff">Schrägbankdrücken</text>
    <text x="40" y="654" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6688aa">4 x 10 · 60 kg</text>

    <!-- Chevron right -->
    <path d="M330 626 L338 634 L330 642" fill="none" stroke="#4a6a7a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ===== Bottom Navigation Bar ===== -->
    <rect x="0" y="720" width="375" height="92" fill="#001622"/>
    <line x1="0" y1="720" x2="375" y2="720" stroke="#1a3a52" stroke-width="0.5"/>

    <!-- Home -->
    <g transform="translate(40, 738)">
      <path d="M10 12 L10 18 H6 V10 L0 10 L10 2 L20 10 H14 V18 H10Z" fill="none" stroke="#4a6a7a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <text x="10" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4a6a7a" text-anchor="middle">Home</text>
    </g>

    <!-- Training (active) -->
    <g transform="translate(112, 738)">
      <rect x="2" y="2" width="16" height="4" rx="2" fill="#FF7324"/>
      <rect x="0" y="8" width="20" height="12" rx="3" fill="none" stroke="#FF7324" stroke-width="1.5"/>
      <circle cx="10" cy="14" r="2" fill="#FF7324"/>
      <text x="10" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FF7324" text-anchor="middle" font-weight="600">Training</text>
    </g>

    <!-- Nutrition -->
    <g transform="translate(184, 738)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#4a6a7a" stroke-width="1.5"/>
      <path d="M10 6 L10 14 M6 10 L14 10" fill="none" stroke="#4a6a7a" stroke-width="1.5" stroke-linecap="round"/>
      <text x="10" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4a6a7a" text-anchor="middle">Ernährung</text>
    </g>

    <!-- Sleep -->
    <g transform="translate(256, 738)">
      <path d="M16 10 C16 5.6 12.4 2 8 2 C7.2 2 6.4 2.1 5.6 2.4 C9 3.8 11.4 7 11.4 10.8 C11.4 14.6 9 17.8 5.6 19.2 C6.4 19.5 7.2 19.6 8 19.6 C12.4 19.6 16 16 16 10Z" fill="none" stroke="#4a6a7a" stroke-width="1.5"/>
      <text x="10" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4a6a7a" text-anchor="middle">Schlaf</text>
    </g>

    <!-- Journal -->
    <g transform="translate(318, 738)">
      <rect x="2" y="2" width="16" height="18" rx="3" fill="none" stroke="#4a6a7a" stroke-width="1.5"/>
      <line x1="6" y1="7" x2="14" y2="7" stroke="#4a6a7a" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="6" y1="11" x2="14" y2="11" stroke="#4a6a7a" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="6" y1="15" x2="11" y2="15" stroke="#4a6a7a" stroke-width="1.2" stroke-linecap="round"/>
      <text x="10" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4a6a7a" text-anchor="middle">Journal</text>
    </g>

    <!-- Bottom Home Indicator -->
    <rect x="120" y="790" width="134" height="5" rx="2.5" fill="#ffffff" opacity="0.3"/>
  </g>
</svg>