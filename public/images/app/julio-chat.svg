<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <clipPath id="phoneClip-chat">
      <rect width="375" height="812" rx="44" ry="44"/>
    </clipPath>
    <linearGradient id="julioBadgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#006DDB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="julioFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a52" stop-opacity="0"/>
      <stop offset="70%" stop-color="#1a3a52" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a3a52"/>
    </linearGradient>
  </defs>

  <!-- Phone Frame -->
  <rect width="375" height="812" rx="44" ry="44" fill="#001622"/>
  <rect width="375" height="812" rx="44" ry="44" fill="none" stroke="#1a3a52" stroke-width="1"/>

  <g clip-path="url(#phoneClip-chat)">
    <!-- Status Bar -->
    <text x="32" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff">9:41</text>
    <g transform="translate(280, 24)">
      <rect x="0" y="6" width="3" height="4" rx="1" fill="#fff"/>
      <rect x="5" y="4" width="3" height="6" rx="1" fill="#fff"/>
      <rect x="10" y="2" width="3" height="8" rx="1" fill="#fff"/>
      <rect x="15" y="0" width="3" height="10" rx="1" fill="#fff"/>
    </g>
    <!-- WiFi -->
    <g transform="translate(305, 22)">
      <path d="M4 12 L8 6 L12 12" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="8" cy="12" r="1.5" fill="#fff"/>
    </g>
    <!-- Battery -->
    <rect x="330" y="23" width="24" height="11" rx="3" fill="none" stroke="#fff" stroke-width="1.2"/>
    <rect x="354" y="27" width="2" height="4" rx="1" fill="#fff" opacity="0.5"/>
    <rect x="332" y="25" width="18" height="7" rx="1.5" fill="#fff"/>

    <!-- ============================================ -->
    <!-- Chat Header Bar -->
    <!-- ============================================ -->
    <rect x="0" y="54" width="375" height="60" fill="#0a1e2e"/>
    <line x1="0" y1="114" x2="375" y2="114" stroke="#1a3a52" stroke-width="0.5"/>

    <!-- Back arrow -->
    <path d="M30 84 L20 84" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <path d="M24 78 L18 84 L24 90" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Julio Avatar -->
    <circle cx="54" cy="84" r="18" fill="url(#julioBadgeGrad)"/>
    <text x="54" y="90" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">J</text>
    <!-- Online dot -->
    <circle cx="68" cy="96" r="5" fill="#0a1e2e"/>
    <circle cx="68" cy="96" r="3.5" fill="#66BB6A"/>

    <!-- Title + AI Badge -->
    <text x="82" y="80" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="17" font-weight="600" fill="#ffffff">Julio</text>
    <rect x="120" y="67" width="28" height="16" rx="8" fill="#006DDB" opacity="0.2"/>
    <text x="134" y="79" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#006DDB" text-anchor="middle">AI</text>
    <text x="82" y="98" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="12" fill="#66BB6A">Online</text>

    <!-- ============================================ -->
    <!-- Chat Messages -->
    <!-- ============================================ -->

    <!-- Timestamp -->
    <text x="187" y="140" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="11" fill="#4a6a7a" text-anchor="middle">Heute, 10:32</text>

    <!-- ============================================ -->
    <!-- User Message 1 (right aligned) -->
    <!-- ============================================ -->
    <g transform="translate(0, 154)">
      <rect x="44" y="0" width="307" height="56" rx="16" fill="#002437"/>
      <rect x="44" y="0" width="307" height="56" rx="16" fill="none" stroke="#0d3350" stroke-width="0.5"/>
      <text x="64" y="22" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">Erstell mir einen Trainingsplan</text>
      <text x="64" y="42" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">f&#252;r Muskelaufbau, 4 Tage die Woche</text>
    </g>

    <!-- ============================================ -->
    <!-- Julio Message (left aligned, long response) -->
    <!-- ============================================ -->
    <g transform="translate(0, 228)">
      <!-- Julio label -->
      <text x="24" y="0" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="11" fill="#4a6a7a">Julio</text>

      <!-- Message bubble -->
      <rect x="24" y="10" width="310" height="340" rx="16" fill="#1a3a52"/>
      <rect x="24" y="10" width="310" height="340" rx="16" fill="none" stroke="#24485f" stroke-width="0.5"/>

      <!-- Blue accent bar -->
      <rect x="24" y="22" width="3" height="316" rx="1.5" fill="#006DDB"/>

      <!-- Opening text -->
      <text x="44" y="36" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">Klar! Hier ist dein 4-Tage</text>
      <text x="44" y="56" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">Push/Pull/Legs Split:</text>

      <!-- Tag 1 header -->
      <text x="44" y="88" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#4FC3F7">Tag 1 - Push</text>
      <text x="44" y="108" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#c8d8e8">Bankdr&#252;cken 4x8</text>
      <text x="44" y="128" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#c8d8e8">Schulterdr&#252;cken 3x10</text>
      <text x="44" y="148" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#c8d8e8">Seitheben 3x12</text>

      <!-- Tag 2 header -->
      <text x="44" y="180" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#FFB74D">Tag 2 - Pull</text>
      <text x="44" y="200" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#c8d8e8">Kreuzheben 4x6</text>
      <text x="44" y="220" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#c8d8e8">Klimmz&#252;ge 3x8</text>

      <!-- Tag 3 header -->
      <text x="44" y="252" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#E57373">Tag 3 - Legs</text>
      <text x="44" y="272" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#c8d8e8">Kniebeugen 4x8</text>
      <text x="44" y="292" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#c8d8e8">Beinpresse 3x12</text>

      <!-- Tag 4 header (truncated/fading) -->
      <text x="44" y="324" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#AB47BC">Tag 4 - Upper Body</text>
      <text x="44" y="344" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#c8d8e8" opacity="0.5">Schr&#228;gbankdr&#252;cken 3x10...</text>

      <!-- Fade overlay at bottom of message -->
      <rect x="24" y="320" width="310" height="30" rx="0" fill="url(#julioFade)"/>
    </g>

    <!-- ============================================ -->
    <!-- User Message 2 (right aligned) -->
    <!-- ============================================ -->
    <g transform="translate(0, 596)">
      <rect x="52" y="0" width="299" height="38" rx="16" fill="#002437"/>
      <rect x="52" y="0" width="299" height="38" rx="16" fill="none" stroke="#0d3350" stroke-width="0.5"/>
      <text x="72" y="24" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">Perfekt, kannst du auch Aufw&#228;rms&#228;tze einbauen?</text>
    </g>

    <!-- ============================================ -->
    <!-- Typing indicator from Julio -->
    <!-- ============================================ -->
    <g transform="translate(0, 650)">
      <text x="24" y="0" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="11" fill="#4a6a7a">Julio</text>
      <rect x="24" y="8" width="72" height="32" rx="16" fill="#1a3a52"/>
      <circle cx="44" cy="24" r="4" fill="#6688aa" opacity="0.9"/>
      <circle cx="60" cy="24" r="4" fill="#6688aa" opacity="0.6"/>
      <circle cx="76" cy="24" r="4" fill="#6688aa" opacity="0.3"/>
    </g>

    <!-- ============================================ -->
    <!-- Input Bar -->
    <!-- ============================================ -->
    <rect x="0" y="710" width="375" height="102" fill="#0a1e2e"/>
    <line x1="0" y1="710" x2="375" y2="710" stroke="#1a3a52" stroke-width="0.5"/>

    <rect x="24" y="724" width="280" height="44" rx="22" fill="#0d3350"/>
    <text x="48" y="751" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" fill="#4a6a7a">Nachricht...</text>

    <!-- Mic icon -->
    <g transform="translate(272, 736)">
      <rect x="4" y="0" width="6" height="10" rx="3" fill="none" stroke="#6688aa" stroke-width="1.2"/>
      <path d="M1 7 C1 12 4.5 14 7 14 C9.5 14 13 12 13 7" fill="none" stroke="#6688aa" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="7" y1="14" x2="7" y2="18" stroke="#6688aa" stroke-width="1.2" stroke-linecap="round"/>
    </g>

    <!-- Send button -->
    <circle cx="328" cy="746" r="20" fill="#0EA5E9"/>
    <!-- Arrow up icon -->
    <path d="M328 738 L328 754 M322 744 L328 738 L334 744" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Home Indicator -->
    <rect x="120" y="800" width="134" height="5" rx="2.5" fill="#ffffff" opacity="0.3"/>
  </g>
</svg>