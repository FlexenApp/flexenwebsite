<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <clipPath id="phoneClip-dash">
      <rect width="375" height="812" rx="44" ry="44"/>
    </clipPath>
    <linearGradient id="calorieGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#006DDB"/>
      <stop offset="100%" stop-color="#4A7DFF"/>
    </linearGradient>
  </defs>

  <!-- Phone Frame -->
  <rect width="375" height="812" rx="44" ry="44" fill="#001622"/>
  <rect width="375" height="812" rx="44" ry="44" fill="none" stroke="#1a3a52" stroke-width="1"/>

  <g clip-path="url(#phoneClip-dash)">
    <!-- Status Bar -->
    <text x="32" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff">9:41</text>
    <!-- Signal bars -->
    <g transform="translate(280, 24)">
      <rect x="0" y="6" width="3" height="4" rx="1" fill="#fff"/>
      <rect x="5" y="4" width="3" height="6" rx="1" fill="#fff"/>
      <rect x="10" y="2" width="3" height="8" rx="1" fill="#fff"/>
      <rect x="15" y="0" width="3" height="10" rx="1" fill="#fff"/>
    </g>
    <!-- WiFi -->
    <g transform="translate(305, 22)">
      <path d="M4 12 L8 6 L12 12" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="8" cy="12" r="1.5" fill="#fff"/>
    </g>
    <!-- Battery -->
    <rect x="330" y="23" width="24" height="11" rx="3" fill="none" stroke="#fff" stroke-width="1.2"/>
    <rect x="354" y="27" width="2" height="4" rx="1" fill="#fff" opacity="0.5"/>
    <rect x="332" y="25" width="18" height="7" rx="1.5" fill="#fff"/>

    <!-- Header: Flexen logo text -->
    <text x="24" y="80" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Flexen</text>
    <text x="24" y="100" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#6688aa">Dienstag, 25. M&#228;rz</text>

    <!-- ============================================ -->
    <!-- Calorie Semi-circle Card -->
    <!-- ============================================ -->
    <rect x="24" y="118" width="327" height="240" rx="20" fill="#0a2a3f"/>
    <rect x="24" y="118" width="327" height="240" rx="20" fill="none" stroke="#1a3a52" stroke-width="0.5"/>

    <!-- Semi-circle background arc -->
    <path d="M 112 278 A 75 75 0 1 1 262 278" fill="none" stroke="#0d3350" stroke-width="14" stroke-linecap="round"/>
    <!-- Semi-circle progress arc (70% of semicircle) -->
    <!-- Semicircle total length ~236. 70% = ~165 offset from end = 236-165=71 -->
    <path d="M 112 278 A 75 75 0 1 1 262 278" fill="none" stroke="#006DDB" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="236" stroke-dashoffset="71"/>

    <!-- Calorie number center -->
    <text x="187" y="240" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">1.847</text>
    <text x="187" y="262" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#6688aa" text-anchor="middle">von 2.200 kcal</text>

    <!-- 3 Macro Circles below the semi-circle -->
    <!-- Protein circle -->
    <g transform="translate(72, 296)">
      <circle cx="30" cy="30" r="26" fill="none" stroke="#0d3350" stroke-width="5"/>
      <circle cx="30" cy="30" r="26" fill="none" stroke="#4FC3F7" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="163" stroke-dashoffset="33" transform="rotate(-90, 30, 30)"/>
      <text x="30" y="28" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">124g</text>
      <text x="30" y="42" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="9" fill="#4FC3F7" text-anchor="middle">Protein</text>
    </g>

    <!-- Carbs circle -->
    <g transform="translate(158, 296)">
      <circle cx="30" cy="30" r="26" fill="none" stroke="#0d3350" stroke-width="5"/>
      <circle cx="30" cy="30" r="26" fill="none" stroke="#FFB74D" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="163" stroke-dashoffset="57" transform="rotate(-90, 30, 30)"/>
      <text x="30" y="28" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">198g</text>
      <text x="30" y="42" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="9" fill="#FFB74D" text-anchor="middle">Carbs</text>
    </g>

    <!-- Fat circle -->
    <g transform="translate(244, 296)">
      <circle cx="30" cy="30" r="26" fill="none" stroke="#0d3350" stroke-width="5"/>
      <circle cx="30" cy="30" r="26" fill="none" stroke="#E57373" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="163" stroke-dashoffset="73" transform="rotate(-90, 30, 30)"/>
      <text x="30" y="28" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">62g</text>
      <text x="30" y="42" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="9" fill="#E57373" text-anchor="middle">Fett</text>
    </g>

    <!-- ============================================ -->
    <!-- Water Section -->
    <!-- ============================================ -->
    <text x="24" y="394" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff">Wasser</text>
    <text x="351" y="394" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" fill="#6688aa" text-anchor="end">1.5l / 2.5l</text>

    <!-- 6 cup icons: 3 filled, 3 empty -->
    <!-- Cup 1 filled -->
    <g transform="translate(34, 406)">
      <rect x="0" y="0" width="36" height="32" rx="6" fill="#78BECD" opacity="0.25"/>
      <rect x="6" y="6" width="24" height="20" rx="4" fill="#78BECD" opacity="0.8"/>
      <path d="M12 14 L15 18 L22 11" stroke="#001622" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Cup 2 filled -->
    <g transform="translate(86, 406)">
      <rect x="0" y="0" width="36" height="32" rx="6" fill="#78BECD" opacity="0.25"/>
      <rect x="6" y="6" width="24" height="20" rx="4" fill="#78BECD" opacity="0.8"/>
      <path d="M12 14 L15 18 L22 11" stroke="#001622" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Cup 3 filled -->
    <g transform="translate(138, 406)">
      <rect x="0" y="0" width="36" height="32" rx="6" fill="#78BECD" opacity="0.25"/>
      <rect x="6" y="6" width="24" height="20" rx="4" fill="#78BECD" opacity="0.8"/>
      <path d="M12 14 L15 18 L22 11" stroke="#001622" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Cup 4 empty -->
    <g transform="translate(190, 406)">
      <rect x="0" y="0" width="36" height="32" rx="6" fill="#0d3350" opacity="0.5"/>
      <rect x="6" y="6" width="24" height="20" rx="4" fill="none" stroke="#1a3a52" stroke-width="1.5"/>
    </g>
    <!-- Cup 5 empty -->
    <g transform="translate(242, 406)">
      <rect x="0" y="0" width="36" height="32" rx="6" fill="#0d3350" opacity="0.5"/>
      <rect x="6" y="6" width="24" height="20" rx="4" fill="none" stroke="#1a3a52" stroke-width="1.5"/>
    </g>
    <!-- Cup 6 empty -->
    <g transform="translate(294, 406)">
      <rect x="0" y="0" width="36" height="32" rx="6" fill="#0d3350" opacity="0.5"/>
      <rect x="6" y="6" width="24" height="20" rx="4" fill="none" stroke="#1a3a52" stroke-width="1.5"/>
    </g>

    <!-- ============================================ -->
    <!-- Meals Grid 2x2 -->
    <!-- ============================================ -->
    <!-- Fr&#252;hst&#252;ck -->
    <rect x="24" y="456" width="156" height="80" rx="14" fill="#0a2a3f"/>
    <rect x="24" y="456" width="156" height="80" rx="14" fill="none" stroke="#1a3a52" stroke-width="0.5"/>
    <text x="44" y="482" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#ffffff">Fr&#252;hst&#252;ck</text>
    <text x="44" y="502" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#006DDB">487 kcal</text>
    <!-- + circle -->
    <circle cx="156" cy="496" r="14" fill="#006DDB" opacity="0.15"/>
    <text x="156" y="501" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="300" fill="#006DDB" text-anchor="middle">+</text>

    <!-- Mittagessen -->
    <rect x="195" y="456" width="156" height="80" rx="14" fill="#0a2a3f"/>
    <rect x="195" y="456" width="156" height="80" rx="14" fill="none" stroke="#1a3a52" stroke-width="0.5"/>
    <text x="215" y="482" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#ffffff">Mittagessen</text>
    <text x="215" y="502" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#006DDB">623 kcal</text>
    <circle cx="327" cy="496" r="14" fill="#006DDB" opacity="0.15"/>
    <text x="327" y="501" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="300" fill="#006DDB" text-anchor="middle">+</text>

    <!-- Abendessen -->
    <rect x="24" y="548" width="156" height="80" rx="14" fill="#0a2a3f"/>
    <rect x="24" y="548" width="156" height="80" rx="14" fill="none" stroke="#1a3a52" stroke-width="0.5"/>
    <text x="44" y="574" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#ffffff">Abendessen</text>
    <text x="44" y="594" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" fill="#4a6a7a">&#8212;</text>
    <!-- + circle prominent -->
    <circle cx="156" cy="588" r="14" fill="#006DDB"/>
    <text x="156" y="593" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="300" fill="#ffffff" text-anchor="middle">+</text>

    <!-- Snacks -->
    <rect x="195" y="548" width="156" height="80" rx="14" fill="#0a2a3f"/>
    <rect x="195" y="548" width="156" height="80" rx="14" fill="none" stroke="#1a3a52" stroke-width="0.5"/>
    <text x="215" y="574" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#ffffff">Snacks</text>
    <text x="215" y="594" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#006DDB">142 kcal</text>
    <circle cx="327" cy="588" r="14" fill="#006DDB" opacity="0.15"/>
    <text x="327" y="593" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="300" fill="#006DDB" text-anchor="middle">+</text>

    <!-- ============================================ -->
    <!-- Bottom Navigation Bar -->
    <!-- ============================================ -->
    <rect x="0" y="740" width="375" height="72" fill="#0a1e2e"/>
    <line x1="0" y1="740" x2="375" y2="740" stroke="#1a3a52" stroke-width="0.5"/>

    <!-- Home (active, blue) -->
    <g transform="translate(18, 752)">
      <path d="M18 10 L3 20 L3 32 L12 32 L12 24 L24 24 L24 32 L33 32 L33 20 Z" fill="none" stroke="#006DDB" stroke-width="1.8" transform="scale(0.6)"/>
      <text x="10" y="30" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#006DDB" text-anchor="middle">Home</text>
      <circle cx="10" cy="35" r="2" fill="#006DDB"/>
    </g>

    <!-- Ern&#228;hrung (green) -->
    <g transform="translate(85, 752)">
      <circle cx="12" cy="8" r="7" fill="none" stroke="#66BB6A" stroke-width="1.5" opacity="0.6"/>
      <path d="M8 6 L8 14 M12 4 L12 14 M16 6 L16 14" stroke="#66BB6A" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
      <text x="12" y="30" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="9" fill="#66BB6A" text-anchor="middle" opacity="0.6">Ern&#228;hrung</text>
    </g>

    <!-- Sport (orange) -->
    <g transform="translate(160, 752)">
      <path d="M4 10 L8 10 M16 10 L20 10 M8 5 L8 15 M16 5 L16 15 M8 7 L16 7 M8 13 L16 13" stroke="#FFB74D" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <text x="12" y="30" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="9" fill="#FFB74D" text-anchor="middle" opacity="0.6">Sport</text>
    </g>

    <!-- Mind (purple) -->
    <g transform="translate(240, 752)">
      <circle cx="12" cy="8" r="7" fill="none" stroke="#AB47BC" stroke-width="1.5" opacity="0.6"/>
      <path d="M9 8 Q12 3 15 8" fill="none" stroke="#AB47BC" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
      <circle cx="12" cy="10" r="1.5" fill="#AB47BC" opacity="0.6"/>
      <text x="12" y="30" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="9" fill="#AB47BC" text-anchor="middle" opacity="0.6">Mind</text>
    </g>

    <!-- Julio (cyan) -->
    <g transform="translate(310, 752)">
      <circle cx="12" cy="8" r="7" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.6"/>
      <text x="12" y="12" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#0EA5E9" text-anchor="middle" opacity="0.6">J</text>
      <text x="12" y="30" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="9" fill="#0EA5E9" text-anchor="middle" opacity="0.6">Julio</text>
    </g>

    <!-- Home Indicator -->
    <rect x="120" y="800" width="134" height="5" rx="2.5" fill="#ffffff" opacity="0.3"/>
  </g>
</svg>